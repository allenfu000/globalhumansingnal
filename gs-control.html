<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Global Signal AI Test</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background: #1a1a1a;
      color: #f3f3f3;
    }

    .panel {
      max-width: 860px;
      margin: 56px auto;
      padding: 28px;
      background: #242424;
      border: 1px solid #333;
      border-radius: 14px;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.35);
    }

    h1 {
      font-size: 34px;
      margin-bottom: 20px;
    }

    textarea {
      width: 100%;
      height: 140px;
      padding: 14px;
      font-size: 20px;
      box-sizing: border-box;
      margin-bottom: 12px;
      background: #0d0d0d;
      color: #f3f3f3;
      border: 1px solid #444;
      border-radius: 8px;
    }

    button {
      padding: 12px 20px;
      font-size: 18px;
      cursor: pointer;
      background: #111;
      color: #fff;
      border: 1px solid #444;
      border-radius: 8px;
    }

    .output {
      margin-top: 24px;
      padding: 16px;
      background: #0d0d0d;
      border: 1px solid #444;
      min-height: 120px;
      white-space: pre-wrap;
      font-size: 20px;
      border-radius: 8px;
    }

    .status {
      margin-top: 12px;
      color: #c0c0c0;
      font-size: 18px;
    }
  </style>
</head>
<body>
  <script>
    const enteredPassword = prompt("请输入密码");
    window.__accessGranted = enteredPassword === "589898";
  </script>

  <div class="panel">
  <h1>Global Signal AI 控制台</h1>

  <textarea id="message" placeholder="在这里输入你想对 AI 说的话..."></textarea>
  <button id="sendBtn">发送给 AI</button>

  <div class="status" id="status"></div>
  <div class="output" id="output">AI 回复会显示在这里</div>
  </div>

  <script>
    if (!window.__accessGranted) {
      document.body.innerHTML = "Access denied";
    } else {
    const sendBtn = document.getElementById("sendBtn");
    const messageInput = document.getElementById("message");
    const output = document.getElementById("output");
    const status = document.getElementById("status");

    messageInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter" && !event.shiftKey) {
        event.preventDefault();
        sendBtn.click();
      }
    });

    sendBtn.addEventListener("click", async () => {
      const message = messageInput.value.trim();

      if (!message) {
        status.textContent = "请先输入内容";
        return;
      }

      status.textContent = "正在请求 AI...";
      output.textContent = "";

      try {
        const response = await fetch("/api/ai", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ message })
        });

        const data = await response.json();

        const reply =
          data?.text ||
          data?.output?.[0]?.content?.[0]?.text ||
          data?.data?.output?.[0]?.content?.[0]?.text ||
          "";

        output.textContent = reply || "（AI 未返回文本内容）";
        status.textContent = "请求成功";
      } catch (error) {
        output.textContent = "请求失败：" + error.message;
        status.textContent = "出错了";
      }
    });
    }
  </script>
</body>
</html>
